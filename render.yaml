services:
  - type: web
    name: social-chatbot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: META_VERIFY_TOKEN
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_WHATSAPP_TOKEN
        sync: false
      - key: META_WHATSAPP_PHONE_ID
        sync: false
      - key: BOT_NAME
        sync: false
      - key: BOT_SYSTEM_PROMPT
        sync: false
      - key: TWITTER_BEARER_TOKEN
        sync: false
      - key: TWITTER_API_KEY
        sync: false
      - key: TWITTER_API_SECRET
        sync: false
      - key: TWITTER_ACCESS_TOKEN
        sync: false
      - key: TWITTER_ACCESS_SECRET
        sync: false
      - key: TIKTOK_ACCESS_TOKEN
        sync: false
      - key: BASE_URL
        sync: false
